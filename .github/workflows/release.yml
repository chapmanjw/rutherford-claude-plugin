name: Release

# The plugin is distributed as a Claude Code marketplace (Claude reads
# .claude-plugin/marketplace.json straight from the repo), so there is nothing to
# publish to a package registry. This workflow turns a pushed version tag into a
# visible GitHub Release with the changelog notes, after re-running the validator
# and enforcing that the tag matches the manifest version.
#
# Release flow: bump .claude-plugin/{plugin,marketplace}.json (lockstep) + add a
# dated CHANGELOG section, commit to main, then `git tag vX.Y.Z && git push --tags`.
# This runs on the tag.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate plugin, manifests, skills, agents, commands, and references
        run: node scripts/validate-plugin.mjs

      - name: Verify the tag matches the manifest version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          manifest=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$version" != "$manifest" ]; then
            echo "::error::Tag $tag (version $version) does not match plugin.json version $manifest — bump the manifests before tagging."
            exit 1
          fi
          echo "tag $tag matches plugin.json version $manifest"

      - name: Extract changelog entry
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # Print the section between '## [<version>]' and the next section or link
          # definition. Literal prefix match (index), not regex — the header contains '['/'.'.
          notes=$(awk -v v="## [$version]" '
            index($0, v) == 1 {flag=1; next}
            flag && /^## \[/ {exit}
            flag && /^\[[^][]+\]: / {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG section found for version $version — add a '## [$version]' entry before tagging."
            exit 1
          fi
          {
            echo "notes<<__EOF__"
            echo "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
